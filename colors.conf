# srcterm colors — dark grayish Source console.
# Per-user override: copy to ~/.config/srcterm/colors.conf.
# Format: key = value. '#' starts a comment (fine inside hex values).

# --- terminal (dark gray inside, light text) ---
foreground = #d2d2d2
background = #383838
cursor     = #e6e6e6
highlight  = #5a5a5a

font       = JetBrainsMono Nerd Font 11
# font_size overrides the size baked into `font` above (persists Ctrl +/-).
# ui_scale scales the chrome/titlebar/input independently (persists Ctrl+Shift +/-).
# font_size = 11
# ui_scale  = 1.0

# --- behavior ---
# show_cwd: show the shell's current dir in the titlebar + before each command.
# echo_command: echo every submitted command into the output (Source-style prompt).
show_cwd     = true
echo_command = true
# color_lines: tint output lines that look like warnings/errors (Source-style).
# Only default-colored text is tinted, so a program's own colors are preserved.
color_lines  = true
warn         = #e6c46a
error        = #d6786a

# --- chrome (gray border/titlebar; inside is darker, above) ---
face       = #555555
light      = #6e6e6e
dark       = #3a3a3a
outer      = #222222
title_text = #e8e8e8
accent     = #d08a2e
entry_bg   = #2a2a2a

# ANSI palette (tuned for the dark gray background)
color0  = #1c1c1c
color1  = #c25a4e
color2  = #8aa85a
color3  = #cfa64f
color4  = #6f93c0
color5  = #b07ab0
color6  = #6ab2ad
color7  = #c2c2c2
color8  = #5a5a5a
color9  = #d6786a
color10 = #a6c46a
color11 = #e6c46a
color12 = #8fb0d8
color13 = #c79abd
color14 = #8fd0c6
color15 = #ededed
